name: Build and check docassemble package
description: Builds the package, checks syntax, and runs YAML validation

inputs:
  python-version:
    description: Python version to use
    default: "3.12"
  run-url-check:
    description: Run URL checker (requires network; set false to skip network calls)
    default: "true"
  skip-templates:
    description: Skip checking URLs in template files
    default: "false"
  ignore-urls:
    description: Comma/newline-separated absolute URLs to ignore in URL checks
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      run: python -m pip install build "dayamlchecker>=1.2.0" requests linkify-it-py docx2python pypdf --user
      shell: bash

    - name: Check syntax for all files
      run: python -m compileall . -q
      shell: bash

    - name: Build a binary wheel and a source tarball
      run: python -m build --sdist --wheel --outdir dist/
      shell: bash

    - name: Run YAML Checker
      run: find . -name "*.yml" -path "*/questions/*" -print0 | xargs -0 python -m dayamlchecker
      shell: bash

    - name: Check URLs in question/template files
      if: ${{ inputs.run-url-check == 'true' }}
      run: |
        args=()
        if [ "${{ inputs.skip-templates }}" = "true" ]; then
          args+=(--skip-templates)
        fi
        if [ -n "${{ inputs.ignore-urls }}" ]; then
          args+=(--ignore-urls "${{ inputs.ignore-urls }}")
        fi
        python -m dayamlchecker.check_questions_urls "${args[@]}"
      shell: bash
