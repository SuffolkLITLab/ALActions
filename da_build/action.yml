name: Build and check docassemble package
description: Builds the package, checks syntax, and runs YAML validation

inputs:
  python-version:
    description: Python version to use
    default: "3.12"
  skip-url-check:
    description: Skip URL checker network calls
    default: "false"
  skip-templates:
    description: Skip checking URLs in template files
    default: "false"
  ignore-urls:
    description: Comma/newline-separated absolute URLs to ignore in URL checks
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      run: python -m pip install build "dayamlchecker>=1.2.0" requests linkify-it-py docx2python pypdf --user
      shell: bash

    - name: Check syntax for all files
      run: python -m compileall . -q
      shell: bash

    - name: Build a binary wheel and a source tarball
      run: python -m build --sdist --wheel --outdir dist/
      shell: bash

    - name: Run YAML Checker
      run: find . -name "*.yml" -path "*/questions/*" -print0 | xargs -0 python -m dayamlchecker
      shell: bash

    - name: Check URLs in question/template files
      run: |
        if [ "${{ inputs.skip-url-check }}" = "true" ]; then
          echo "Skipping URL checks"
          exit 0
        fi

        args=()
        if [ "${{ inputs.skip-templates }}" = "true" ]; then
          args+=(--skip-templates)
        fi
        if [ -n "${{ inputs.ignore-urls }}" ]; then
          args+=(--ignore-urls "${{ inputs.ignore-urls }}")
        fi

        output_file="$(mktemp)"
        set +e
        python -m dayamlchecker.check_questions_urls "${args[@]}" 2>&1 | tee "$output_file"
        checker_status=${PIPESTATUS[0]}
        set -e

        if [ "$checker_status" -ne 0 ]; then
          exit "$checker_status"
        fi

        # Surface warning lines as GitHub Actions annotations without failing the job.
        in_warning_block=false
        while IFS= read -r line; do
          if [ "$line" = "URL checker warnings:" ]; then
            in_warning_block=true
            continue
          fi
          if [ "$in_warning_block" != "true" ]; then
            continue
          fi
          if [ -z "$line" ]; then
            continue
          fi

          escaped="${line//'%'/'%25'}"
          escaped="${escaped//$'\r'/'%0D'}"
          escaped="${escaped//$'\n'/'%0A'}"
          echo "::warning title=URL checker::$escaped"
        done < "$output_file"
      shell: bash
